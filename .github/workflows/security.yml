name: Security

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["**"]
  schedule:
    - cron: "0 3 * * 1"

permissions:
  contents: read

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run cargo-audit
        run: cargo audit

  github-hardening-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Block dangerous workflow triggers
        run: |
          forbidden='pull_request'"_target"
          if grep -R --line-number "$forbidden" .github/workflows; then
            echo "disallowed workflow trigger found"
            exit 1
          fi
